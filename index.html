<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DailyWord</title>
  <meta name="description" content="Un rincón romántico donde guardar y publicar frases, poemas y letras cada día." />
  <meta property="og:title" content="DailyWord" />
  <meta property="og:description" content="Un rincón romántico donde guardar y publicar frases, poemas y letras cada día." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container py-2">
      <a class="navbar-brand" href="#hoy">
        <svg class="brand-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M12 20s-7-4.35-9.2-8.48C1.02 8.2 2.76 4.5 6.35 4.5c2.08 0 3.54 1.17 4.33 2.52.79-1.35 2.25-2.52 4.33-2.52 3.59 0 5.33 3.7 3.55 7.02C19 15.65 12 20 12 20Z"/>
          <path d="M7.5 12.2c1 .2 1.65-.2 2.15-1.15.45 1.45 1.2 2.2 2.35 2.28 1.02.08 1.78-.38 2.55-1.56.38.62.88.93 1.45.93"/>
        </svg>
        DailyWord
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Abrir navegación">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="#hoy">Frase del día</a></li>
          <li class="nav-item"><a class="nav-link" href="#archivo">Archivo</a></li>
          <li class="nav-item ms-lg-2">
            <button class="theme-toggle" type="button" data-theme-toggle aria-label="Cambiar tema">
              <span aria-hidden="true">☾</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main id="contenido">
    <section class="section-pad" id="hoy">
      <div class="container">
        <div class="row g-4 align-items-start">
            <div>
              <p class="eyebrow">Lectura de hoy</p>
            </div>
          </div>

          <div class="col-lg-8">
            <article class="card-romantic mb-4">
              <div class="entry-date" id="featuredDate"></div>
              <h2 class="mb-3">Frase del día</h2>
              <p class="entry-text" id="featuredText"></p>
              <div class="d-flex flex-wrap gap-2 align-items-center">
                <span class="entry-tag" id="featuredType"></span>
                <span class="helper" id="featuredSignature"></span>
              </div>
            </article>
          </div>
        </div>
      </div>
    </section>

    <section class="section-pad pt-0" id="archivo">
      <div class="container">
        <p class="eyebrow">Archivo de recuerdos</p>
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-4">
          <div>
            <h2>Mensajes anteriores</h2>
          </div>
        </div>
        <div class="timeline" id="timeline"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container d-flex flex-column flex-md-row justify-content-between gap-2">
      <span>Hecho con cariño, Bootstrap y una idea bonita.</span>
      <span>Pensado para GitHub Pages y edición manual sencilla.</span>
    </div>
  </footer>

  <script src="./notes.js"></script>
  <script>
    const timeline = document.getElementById('timeline');
    const featuredDate = document.getElementById('featuredDate');
    const featuredText = document.getElementById('featuredText');
    const featuredType = document.getElementById('featuredType');
    const featuredSignature = document.getElementById('featuredSignature');

    function formatSpanishDate(value) {
      const date = new Date(value + 'T12:00:00');
      return new Intl.DateTimeFormat('es-ES', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      }).format(date);
    }

    function escapeHtml(text) {
      return text.replace(/[&<>\\"]/g, (match) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;'
      }[match]));
    }

    function renderFeatured() {
      if (!notes || !notes.length) return;
      const latest = notes[0];
      featuredDate.textContent = formatSpanishDate(latest.date);
      featuredText.textContent = latest.text;
      featuredType.textContent = latest.type;
      featuredSignature.textContent = latest.signature || 'Publicado por ti';
    }

    function renderTimeline() {
      if (!notes || !notes.length) {
        timeline.innerHTML = `
          <article class="card-romantic">
            <h3>Aún no hay entradas</h3>
            <p class="section-note mb-0">Añade tu primera frase en <code>notes.js</code>.</p>
          </article>
        `;
        return;
      }

      timeline.innerHTML = notes.map((note, index) => `
        <article class="card-romantic">
          <div class="entry-date">${formatSpanishDate(note.date)}</div>
          <h3>${index === 0 ? 'Entrada destacada' : note.type}</h3>
          <p class="entry-text">${escapeHtml(note.text)}</p>
          <div class="d-flex flex-wrap gap-2 align-items-center">
            <span class="entry-tag">${escapeHtml(note.type)}</span>
            <span class="helper">${escapeHtml(note.signature || 'Publicado por ti')}</span>
          </div>
        </article>
      `).join('');
    }

    renderFeatured();
    renderTimeline();

    const htmlRoot = document.documentElement;
    const toggle = document.querySelector('[data-theme-toggle]');
    let currentTheme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

    htmlRoot.setAttribute('data-theme', currentTheme);
    toggle.innerHTML = currentTheme === 'dark' ? '☀' : '☾';

    toggle.addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      htmlRoot.setAttribute('data-theme', currentTheme);
      toggle.innerHTML = currentTheme === 'dark' ? '☀' : '☾';
      toggle.setAttribute('aria-label', currentTheme === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro');
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
